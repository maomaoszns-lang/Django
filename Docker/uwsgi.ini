[uwsgi]
# 必须全部为绝对路径
# 项目的路径
chdir           = /www/
# Django的wsgi文件
module          = devops.wsgi

# 进程相关的设置
# 主进程
master          = true
# 最大数量的工作进程
processes       = 20
threads         = 25
# IP端口
http            = :8000
# socket文件地址
socket          = /data/sock/devops.sock
# 设置socket的权限
chmod-socket    = 666

# 退出的时候是否清理环境
vacuum          = true

log-maxsize     = 50000000